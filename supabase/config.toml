project_id = "solana-startups-hub-v2"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

# Supabase Auth is retired: identity lives in Privy and sessions are JWTs
# minted by /api/auth/session with the project secret. auth stays enabled only
# because the platform requires the service; nothing signs in through it.
[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/**", "http://127.0.0.1:3000/**"]
jwt_expiry = 3600
enable_signup = false

[studio]
enabled = true
port = 54323

# Authenticated by the x-webhook-secret header set by the database trigger,
# not by a Supabase JWT.
[functions.tweet-new-startup]
verify_jwt = false

[functions.telegram-startup-review]
verify_jwt = false

# Called by Telegram, which authenticates with the secret token it echoes in the
# X-Telegram-Bot-Api-Secret-Token header.
[functions.telegram-review-callback]
verify_jwt = false

# Called by the browser with the app-minted JWT (Privy exchange). The platform
# check only understands Supabase Auth sessions, so the function verifies the
# token itself with jose + AUTH_JWT_SECRET.
[functions.verify-payment]
verify_jwt = false
