project_id = "solana-startups-hub-v2"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/**", "http://127.0.0.1:3000/**"]
jwt_expiry = 3600
enable_signup = true

[auth.rate_limit]
web3 = 30

[auth.web3.solana]
enabled = true

[studio]
enabled = true
port = 54323

# Authenticated by the x-webhook-secret header set by the database trigger,
# not by a Supabase JWT.
[functions.tweet-new-startup]
verify_jwt = false
